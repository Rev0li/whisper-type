name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python deps + PyInstaller
        run: pip install pyinstaller -r requirements.txt

      # PyInstaller bundle le sidecar Python en un seul .exe autonome.
      # --collect-all faster_whisper / ctranslate2 / sounddevice : inclut les DLL C natives.
      # --exclude-module keyboard : inutile en mode sidecar, évite des problèmes de droits UAC.
      - name: Build Python sidecar with PyInstaller
        run: |
          pyinstaller --onefile `
            --collect-all faster_whisper `
            --collect-all ctranslate2 `
            --collect-all sounddevice `
            --exclude-module keyboard `
            --name whisper_type `
            whisper_type.py

      # Tauri externalBin attend src-tauri/binaries/whisper_type-{triple}.exe
      - name: Stage sidecar for Tauri externalBin
        run: |
          New-Item -ItemType Directory -Force -Path src-tauri/binaries
          Copy-Item dist/whisper_type.exe `
            src-tauri/binaries/whisper_type-x86_64-pc-windows-msvc.exe

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install frontend deps
        run: npm install

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust deps
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Build Tauri app
        run: npm run build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
