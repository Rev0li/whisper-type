name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
      id-token: write  # requis par SignPath

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python deps + PyInstaller
        run: pip install pyinstaller -r requirements.txt

      # PyInstaller bundle le sidecar Python en un seul .exe autonome.
      # --collect-all faster_whisper / ctranslate2 / sounddevice : inclut les DLL C natives.
      # --exclude-module keyboard : inutile en mode sidecar, évite des problèmes de droits UAC.
      - name: Build Python sidecar with PyInstaller
        run: |
          pyinstaller --onefile `
            --noconsole `
            --collect-all faster_whisper `
            --collect-all ctranslate2 `
            --collect-all sounddevice `
            --exclude-module keyboard `
            --name whisper_type `
            whisper_type.py

      # Tauri externalBin attend src-tauri/binaries/whisper_type-{triple}.exe
      - name: Stage sidecar for Tauri externalBin
        run: |
          New-Item -ItemType Directory -Force -Path src-tauri/binaries
          Copy-Item dist/whisper_type.exe `
            src-tauri/binaries/whisper_type-x86_64-pc-windows-msvc.exe

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install frontend deps
        run: npm install

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust deps
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Build Tauri app
        run: npm run build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload unsigned installer (pour SignPath)
        id: upload-unsigned
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-installer
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi

      - name: Sign with SignPath
        uses: signpath/github-action-submit-signing-request@v1
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORG_ID }}
          project-slug: '_whisper-type2'
          signing-policy-slug: 'release-signing'
          artifact-configuration-slug: 'initial-version'
          github-artifact-id: ${{ steps.upload-unsigned.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: signed-installer

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: signed-installer/**

  build-linux:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # Deps Tauri (WebKit 4.1 requis pour Tauri v2) + PortAudio (sounddevice) + patchelf (PyInstaller)
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            portaudio19-dev \
            libasound2-dev \
            patchelf

      - name: Install Python deps + PyInstaller
        run: pip install pyinstaller -r requirements.txt

      # Sur Linux, keyboard n'est pas utilisé (mode signal) — exclusion préventive.
      - name: Build Python sidecar with PyInstaller
        run: |
          pyinstaller --onefile \
            --collect-all faster_whisper \
            --collect-all ctranslate2 \
            --collect-all sounddevice \
            --exclude-module keyboard \
            --name whisper_type \
            whisper_type.py

      # Tauri externalBin attend src-tauri/binaries/whisper_type-{triple} (sans .exe sur Linux)
      - name: Stage sidecar for Tauri externalBin
        run: |
          mkdir -p src-tauri/binaries
          cp dist/whisper_type \
            src-tauri/binaries/whisper_type-x86_64-unknown-linux-gnu

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install frontend deps
        run: npm install

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache Rust deps
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Build Tauri app
        run: npm run build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: false
          files: |
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/deb/*.deb
