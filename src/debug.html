<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Debug Logs</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    body { display: block; padding: 0; }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      position: sticky;
      top: 0;
    }

    .toolbar-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .toolbar-actions { display: flex; gap: 8px; }

    .btn-small {
      background: var(--border);
      color: var(--text-muted);
      border: none;
      border-radius: 5px;
      padding: 4px 10px;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .btn-small:hover { background: #3a3a3a; color: var(--text); }

    #log-container {
      height: calc(100vh - 45px);
      overflow-y: auto;
      padding: 10px 14px;
      font-family: "Cascadia Code", "Consolas", "Courier New", monospace;
      font-size: 12px;
      line-height: 1.6;
    }

    .log-line {
      white-space: pre-wrap;
      word-break: break-all;
      color: var(--text-muted);
    }
    .log-line.info  { color: #a8d8a8; }
    .log-line.warn  { color: #f0c070; }
    .log-line.error { color: #f07070; }

    #empty-state {
      color: var(--text-muted);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      text-align: center;
      padding-top: 60px;
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <span class="toolbar-title">Debug Logs</span>
    <div class="toolbar-actions">
      <button class="btn-small" id="btn-scroll">Auto-scroll: ON</button>
      <button class="btn-small" id="btn-clear">Clear</button>
    </div>
  </div>

  <div id="log-container">
    <div id="empty-state">En attente des logs...</div>
  </div>

  <script src="debug.js"></script>
</body>
</html>
