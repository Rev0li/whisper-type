<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Téléchargement</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .download-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .model-badge {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 4px 10px;
      font-size: 13px;
      font-weight: 600;
      color: var(--accent);
    }
    .size-hint {
      font-size: 12px;
      color: var(--text-muted);
    }
    .progress-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 999px;
      height: 8px;
      overflow: hidden;
      margin-bottom: 8px;
    }
    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 999px;
      transition: width 0.3s ease;
      width: 0%;
    }
    .progress-fill.indeterminate {
      animation: slide 1.4s ease-in-out infinite;
      width: 30% !important;
    }
    @keyframes slide {
      0%   { margin-left: 0; }
      50%  { margin-left: 70%; }
      100% { margin-left: 0; }
    }
    .progress-row {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 12px;
    }
    .file-label {
      font-size: 12px;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      height: 18px;
    }
    button#retry {
      background: var(--accent);
      border: none;
      border-radius: var(--radius);
      color: #fff;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      padding: 9px 20px;
      transition: background 0.15s;
      display: none;
    }
    button#retry:hover { background: var(--accent-hover); }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>whisper-type</h1>
      <p class="subtitle" id="subtitle">Téléchargement du modèle...</p>
    </header>

    <main>
      <div class="download-info">
        <span class="model-badge" id="model-name">small</span>
        <span class="size-hint" id="size-hint">~461 MB</span>
      </div>

      <div class="progress-wrap">
        <div class="progress-fill indeterminate" id="progress-fill"></div>
      </div>

      <div class="progress-row">
        <span id="progress-text">Connexion...</span>
        <span id="file-counter"></span>
      </div>

      <p class="file-label" id="file-label"></p>
    </main>

    <footer>
      <button id="retry">Réessayer</button>
      <span id="status"></span>
    </footer>
  </div>
  <script src="download.js"></script>
</body>
</html>
