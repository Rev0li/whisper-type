<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title></title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
      user-select: none;
      -webkit-app-region: drag;
    }

    #pill {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(15, 15, 15, 0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 999px;
      padding: 0 18px;
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      font-weight: 500;
      color: #e8e8e8;
      letter-spacing: 0.1px;
    }

    #dot {
      flex-shrink: 0;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #ff4444;
    }

    /* --- recording : point rouge pulsant --- */
    body.recording #dot {
      background: #ff4444;
      animation: pulse 1.2s ease-in-out infinite;
    }

    /* --- transcribing : anneau orange qui tourne --- */
    body.transcribing #dot {
      width: 13px;
      height: 13px;
      background: transparent;
      border: 2px solid rgba(255, 170, 0, 0.3);
      border-top-color: #ffaa00;
      animation: spin 0.75s linear infinite;
    }

    @keyframes pulse {
      0%, 100% {
        transform: scale(1);
        box-shadow: 0 0 0 0 rgba(255, 68, 68, 0.5);
      }
      50% {
        transform: scale(1.25);
        box-shadow: 0 0 0 5px rgba(255, 68, 68, 0);
      }
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body class="recording">
  <div id="pill">
    <div id="dot"></div>
    <span id="label">Recording...</span>
  </div>
  <script src="overlay.js"></script>
</body>
</html>
